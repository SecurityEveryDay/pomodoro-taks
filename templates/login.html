<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — PomodoroFoco</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary:    #0a0e17;
  --bg-secondary:  #111927;
  --bg-card:       #1a2332;
  --text-primary:  #e4e7eb;
  --text-secondary:#9ca3af;
  --text-muted:    #6b7280;
  --accent-green:  #10b981;
  --accent-red:    #ef4444;
  --accent-purple: #8b5cf6;
  --accent-blue:   #3b82f6;
  --border-color:  #2d3748;
  --font-main:     'Segoe UI', system-ui, -apple-system, sans-serif;
  --radius:        8px;
  --radius-lg:     12px;
}

body {
  font-family: var(--font-main);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image:
    linear-gradient(rgba(16,185,129,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(16,185,129,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.login-wrapper {
  width: 100%;
  max-width: 400px;
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon-lg {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(139,92,246,.3);
}

.login-logo h1 {
  font-size: 1.5rem; font-weight: 700;
  color: var(--text-primary); margin-bottom: 4px;
}
.login-logo h1 span { color: var(--accent-purple); }
.login-logo p { font-size: 0.85rem; color: var(--text-muted); }

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}

.login-card h2 {
  font-size: 1.15rem; font-weight: 600;
  margin-bottom: 6px; color: var(--text-primary);
}

.login-card .subtitle {
  font-size: 0.85rem; color: var(--text-muted);
  margin-bottom: 28px;
}

.alert-error {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(239,68,68,.12);
  border: 1px solid rgba(239,68,68,.35);
  border-radius: var(--radius);
  color: #fca5a5;
  font-size: 0.88rem;
  margin-bottom: 22px;
  animation: shake .3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 14px 20px;
  background: #fff; border: none; border-radius: var(--radius);
  color: #1a1a1a; font-size: 0.95rem; font-weight: 600;
  font-family: var(--font-main); cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  letter-spacing: 0.3px;
}

.btn-google:hover {
  background: #f1f3f4;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,.4);
}

.btn-google:active { transform: translateY(0); }

.security-badge {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 20px;
  font-size: 0.75rem; color: var(--text-muted);
}
.security-badge::before { content: '🔒'; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="login-wrapper">

  <div class="login-logo">
    <div class="logo-icon-lg">🍅</div>
    <h1>Pomodoro<span>Foco</span></h1>
    <p>Produtividade com propósito</p>
  </div>

  <div class="login-card">
    <h2>Bem-vindo(a)</h2>
    <p class="subtitle">Acesso restrito a colaboradores SecDay</p>

    {% if request.args.get('error') == 'acesso_negado' %}
    <div class="alert-error">
      <span>⚠️</span>
      <span>Acesso restrito.</span>
    </div>
    {% endif %}

    <a href="/auth/google" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </a>

    <div class="security-badge">
      Sessão protegida por cookie seguro
    </div>
  </div>

</div>

</body>
</html>
