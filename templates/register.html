<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro — PomodoroFoco</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #111;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-pattern {
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 80% 50%, rgba(230,57,70,0.15) 0%, transparent 50%),
              radial-gradient(ellipse at 20% 80%, rgba(44,198,83,0.1) 0%, transparent 50%);
}
.grid-bg {
  position: fixed; inset: 0; pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.auth-container {
  position: relative; z-index: 10;
  width: 100%; max-width: 440px; padding: 24px;
}
.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo .icon { font-size: 40px; display: block; margin-bottom: 10px; }
.auth-logo h1 { font-family: 'Fira Code', 'Consolas', monospace; font-size: 22px; font-weight: 700; color: white; }
.auth-logo h1 span { color: #10b981; }
.auth-card {
  background: #1a2332; border: 1px solid #2d3748;
  border-radius: 16px; padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.auth-title { font-size: 20px; font-weight: 700; color: white; margin-bottom: 24px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 11px 14px;
  background: #2a2a2a; border: 1px solid #444; border-radius: 10px;
  color: white; font-size: 14px; font-family: inherit; transition: border-color 0.15s;
}
.form-control:focus { outline: none; border-color: #10b981; }
.form-control::placeholder { color: #555; }
.btn-submit {
  width: 100%; padding: 13px;
  background: #10b981; border: none; border-radius: 10px;
  color: white; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.btn-submit:hover { background: #c1121f; transform: translateY(-1px); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
.auth-footer a { color: #10b981; text-decoration: none; font-weight: 600; }
.alert-error {
  background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3);
  color: #ff6b6b; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="grid-bg"></div>

<div class="auth-container">
  <div class="auth-logo">
    <span class="icon">🍅</span>
    <h1>Pomodoro<span>Foco</span></h1>
  </div>
  <div class="auth-card">
    <h2 class="auth-title">Criar nova conta</h2>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST" action="/cadastro">
      <div class="form-group">
        <label class="form-label">Nome de usuário</label>
        <input type="text" name="username" class="form-control" placeholder="joaosilva" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="form-control" placeholder="mín. 6 chars" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="repetir senha" required>
        </div>
      </div>
      <button type="submit" class="btn-submit">Criar conta</button>
    </form>
    <div class="auth-footer">
      Já tem conta? <a href="/login">Entrar</a>
    </div>
  </div>
</div>
</body>
</html>
